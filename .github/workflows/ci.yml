name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: HTML validate
        run: npx html-validate index.html || true
