<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="EV 費用" />
    <meta name="theme-color" content="#378ADD" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; manifest-src 'self';"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23378ADD' rx='20'/%3E%3Ctext x='50' y='68' font-size='54' text-anchor='middle' fill='white'%3E⚡%3C/text%3E%3C/svg%3E"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="css/app.css" />
    <title>EV 費用追蹤</title>
  </head>
  <body>
    <header class="sync-bar">
      <span class="s" id="sync-msg" style="color: var(--text-ghost)">○ 初始化</span>
      <button type="button" data-action="reload" aria-label="重新整理">重新整理</button>
    </header>

    <section class="stats" id="stats" aria-label="統計摘要"></section>

    <main class="card">
      <!-- ADD -->
      <section id="tab-add" aria-label="新增記錄">
        <div id="edit-bar" class="hide"></div>
        <button id="copy-last" type="button" class="copy-last hide" data-action="copyLast"></button>
        <div class="type-row" role="tablist" aria-label="類型">
          <button type="button" class="type-btn on" data-action="setType" data-type="r" role="tab">
            ⚡ 日常
          </button>
          <button type="button" class="type-btn" data-action="setType" data-type="o" role="tab">
            🔧 一次性
          </button>
        </div>
        <div class="sect-title">選擇類別</div>
        <div class="cat-grid" id="cat-grid"></div>
        <div class="row">
          <div>
            <label for="f-amt">金額（元）</label>
            <input type="number" inputmode="numeric" id="f-amt" placeholder="0" min="0" />
          </div>
          <div>
            <label for="f-date">日期</label>
            <input type="date" id="f-date" />
          </div>
        </div>
        <div class="field hide" id="brand-field">
          <label for="f-brand">品牌 / 廠商</label>
          <input type="text" id="f-brand" placeholder="例:3M、KW" maxlength="60" />
        </div>
        <div class="row hide" id="ev-fields">
          <div>
            <label for="f-kwh">度數 kWh(選填)</label>
            <input type="number" inputmode="decimal" id="f-kwh" placeholder="0.0" step="0.01" min="0" />
          </div>
          <div>
            <label for="f-odo">里程 km(選填)</label>
            <input type="number" inputmode="numeric" id="f-odo" placeholder="車機上的里程" min="0" />
          </div>
        </div>
        <div class="field">
          <label for="f-note">備註(選填)</label>
          <input type="text" id="f-note" maxlength="120" />
        </div>
        <button type="button" class="btn-primary" id="btn-submit" data-action="submit">＋ 新增</button>
      </section>

      <!-- LOAN -->
      <section id="tab-loan" class="hide" aria-label="貸款">
        <div id="loan-display"></div>
        <div class="row">
          <div>
            <label for="l-price">車價</label>
            <input type="number" inputmode="numeric" id="l-price" placeholder="0" min="0" />
          </div>
          <div>
            <label for="l-down">頭期款</label>
            <input type="number" inputmode="numeric" id="l-down" placeholder="0" min="0" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="l-rate">年利率 %</label>
            <input type="number" inputmode="decimal" id="l-rate" placeholder="2.5" step="0.01" min="0" />
          </div>
          <div>
            <label for="l-months">期數(月)</label>
            <input type="number" inputmode="numeric" id="l-months" placeholder="60" min="1" />
          </div>
        </div>
        <div class="field">
          <label for="l-start">首期日期</label>
          <input type="date" id="l-start" />
        </div>
        <button type="button" class="btn-save" id="btn-loan" data-action="saveLoan">儲存貸款設定</button>
      </section>

      <!-- LIST -->
      <section id="tab-list" class="hide" aria-label="明細">
        <div class="io-row">
          <button type="button" class="io-btn" data-action="exportCsv" aria-label="匯出 CSV">
            ⬇️ 匯出 CSV
          </button>
          <button type="button" class="io-btn" data-action="importCsv" aria-label="匯入 CSV">
            ⬆️ 匯入 CSV
          </button>
          <input type="file" id="csv-file" accept=".csv,text/csv" class="visually-hidden" />
        </div>
        <div class="field">
          <label for="search" class="visually-hidden">搜尋</label>
          <input type="text" id="search" placeholder="🔍  搜尋類別、備註、日期…" />
        </div>
        <div class="filter-row">
          <label for="m-filter" class="visually-hidden">月份篩選</label>
          <select id="m-filter">
            <option value="all">全部月份</option>
          </select>
          <label for="t-filter" class="visually-hidden">類型篩選</label>
          <select id="t-filter">
            <option value="all">全部</option>
            <option value="r">日常</option>
            <option value="o">一次性</option>
          </select>
        </div>
        <div class="sort-row" id="sort-row"></div>
        <div style="font-size: 12px; color: var(--text-ghost); margin-bottom: 8px" id="list-count"></div>
        <div id="list"></div>
      </section>

      <!-- CHART -->
      <section id="tab-chart" class="hide" aria-label="統計">
        <div id="ev-stats"></div>
        <div id="trend-container"></div>
        <label for="c-month" class="visually-hidden">月份</label>
        <select id="c-month" style="width: auto; margin-bottom: 12px">
          <option value="all">全部月份</option>
        </select>
        <div id="chart"></div>
      </section>
    </main>

    <nav class="nav" id="nav" aria-label="主導覽"></nav>

    <script src="config.local.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
